name: cad-uv-map
channels:
  - conda-forge
dependencies:
  # Core language/runtime
  - python=3.12
  - pip
  - numpy

  # Native extension build stack
  - cmake>=3.24
  - ninja
  - cxx-compiler
  - pybind11
  - scikit-build-core

  # OpenCascade / CAD stack
  - occt=7.8.*
  - ocp=7.8.*
  - cadquery
  - build123d

  # Tests and code quality
  - pytest
  - ruff

  # Notebook and CAD/BRep visualization
  - jupyterlab
  - ipykernel
  - ipywidgets

  # Lightweight rendered-mesh debug viewers
  - vispy
  - pyqt
  - trimesh
  - pyglet

  # Utility packages for baking/debug images
  - pillow
  - imageio
  - matplotlib

  # Packages that are commonly installed from PyPI in the current project env.
  - pip:
      - jupyter-cadquery
      - ocp-vscode
      - ocp-tessellate
